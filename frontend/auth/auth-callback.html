<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing you in... – SK Fashion</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500;600;700&family=Cinzel:wght@400;600;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root{--pink:#D4449A;--blue:#2B5CE6;--cream:#FAF6F0;--dark:#12101E;}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.5rem;}
    .loader{width:50px;height:50px;border:4px solid var(--cream);border-top-color:var(--pink);border-radius:50%;animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .msg{font-size:1.1rem;font-weight:500;color:var(--dark);}
    .error{color:#EF4444;max-width:400px;text-align:center;font-size:0.9rem;}
    a{color:var(--pink);text-decoration:none;}
  </style>
</head>
<body>
  <div class="loader"></div>
  <p class="msg">Signing you in securely...</p>
  <p id="error-msg" class="error" style="display:none;"></p>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://xipykdvitueezmnvugjt.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_E4MU3kxkc7WMLtMCIh0ypA_LQwjytoy';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function handleCallback() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const error = params.get('error');
      const errorDesc = params.get('error_description');

      if (error) {
        showError(errorDesc || error);
        return;
      }

      if (!code) {
        showError('No authorization code received');
        return;
      }

      try {
        // Exchange code for Supabase session
        const { data: session, error: sessionError } = await supabase.auth.exchangeCodeForSession(code);
        if (sessionError) throw sessionError;

        if (!session.user) {
          throw new Error('No user data received');
        }

        // Send access token to backend to get app JWT and redirect URL
        const response = await fetch('/api/oauth/facebook', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ access_token: session.access_token })
        });

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.error || 'Authentication failed');
        }

        // Redirect to customer dashboard with token/user in query
        window.location.href = result.redirect_url;
      } catch (err) {
        showError(err.message);
      }
    }

    function showError(msg) {
      document.querySelector('.loader').style.display = 'none';
      document.querySelector('.msg').style.display = 'none';
      const errEl = document.getElementById('error-msg');
      errEl.textContent = 'Authentication failed: ' + msg;
      errEl.style.display = 'block';
    }

    // Run
    handleCallback();
  </script>
</body>
</html>
